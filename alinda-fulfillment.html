.header { background: #D0011B; padding: 0 20px; height: 54px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(208,1,27,0.3); }

<script>

  { kw:['tuff tray','ถาดกิจกรรม','sensory tray','大黑盘','感官盘'], p:'Tuff Tray (Sensory) 1m', e:'🌊' },

  { kw:['storage cabinet','收纳柜','玩具柜'], p:'Toy Storage Cabinet', e:'📦' },
  { kw:['bookshelf','书架'], p:'Bookshelf', e:'📚' },
  { kw:['rubber swing board','swing board','橡胶秋千'], p:'Rubber Swing Board', e:'🤸' },
  { kw:['swing','秋千'], p:'Swing', e:'🤸' },
  { kw:['overhead ladder','云梯'], p:'Overhead Ladder', e:'🪜' },
  { kw:['moon table','月亮桌'], p:'Moon-shaped Table', e:'🌙' },
  { kw:['hollow blocks','空心积木'], p:'Large Hollow Blocks', e:'🏗️' },
  { kw:['sand play','sandpit','沙池','玩沙'], p:'Sand Play Equipment', e:'🏖️' },
  { kw:['slide','滑梯'], p:'Slide', e:'🛝' },
  { kw:['high chair','餐椅'], p:'High Chair', e:'🪑' },
  { kw:['kindergarten table','幼儿园桌'], p:'Kindergarten Table', e:'🪑' },
];

// VR DATA — updated by "Sync VR Cargo" button
// Format: { tracking: { arrivedTH, shippingCost, lot, isArrived } }
let vrData = JSON.parse(localStorage.getItem('a_vr_v1') || '{}');

// ERP DATA — from Google Sheet
let erpItems = [];

// STATE
let packed = JSON.parse(localStorage.getItem('a_packed_v5') || '{}');
let overrides = JSON.parse(localStorage.getItem('a_ov_v5') || '{}');
let trackOverrides = JSON.parse(localStorage.getItem('a_track_v5') || '{}'); // manually added trackings
let currentTab = 'pending';
let editingId = null;
let trackingForId = null;

// SHOPEE ORDERS from Gmail
const SHOPEE = [
  { id:'#260702M8CH0YYD', customer:'phanuwatphph', deadline:'2026-08-05', date:'2026-07-02', raw:'Alinda STALL BAR WALL BAR fitness pilates jungle gym', qty:1, price:32500, variant:'M' },
  { id:'#260702KN4U3W22', customer:'deepakdang', deadline:'2026-07-16', date:'2026-07-02', raw:'Tuff tray ถาดกิจกรรม sensory play loose part early year', qty:2, price:11100, variant:'Tray+stand 100cm' },
  { id:'#260702KK6MSANQ', customer:'35593559bigblue', deadline:'2026-07-16', date:'2026-07-02', raw:'Balance Board Stepping Stones sensory kids', qty:1, price:3200, variant:'' },
  { id:'#260630E94AHAXJ', customer:'chaokha.kids', deadline:'2026-07-24', date:'2026-06-30', raw:'Indoor Climbing Frame multi-function foldable wood', qty:1, price:8900, variant:'' },
  { id:'#260629BUPXCKYJ', customer:'preeyapornsaw', deadline:'2026-07-23', date:'2026-06-29', raw:'Tuff tray sensory tray 100cm kindergarten', qty:1, price:5550, variant:'' },
  { id:'#26062895WWCYUR', customer:'natyongvongphaiboon', deadline:'2026-07-04', date:'2026-06-28', raw:'Rubber Swing Board silicon indoor outdoor', qty:1, price:1290, variant:'' },
  { id:'#2606288TWH39R4', customer:'ito_onz', deadline:'2026-08-01', date:'2026-06-27', raw:'Alinda STALL BAR WALL BAR wall mount hanger bar training', qty:1, price:32500, variant:'L' },
  { id:'#2606264RFYK3VS', customer:'pantakanrimkeeree', deadline:'2026-07-10', date:'2026-06-26', raw:'Dome climber 10FT outdoor indoor balance', qty:1, price:4500, variant:'10FT' },
  { id:'#260622QTB3NU1X', customer:'daungvan', deadline:'2026-07-08', date:'2026-06-22', raw:'Tuff tray sensory tray 1m black', qty:2, price:11100, variant:'' },
  { id:'#260618DNFKS4UN', customer:'puiifaii44', deadline:'2026-07-07', date:'2026-06-18', raw:'Toy Storage Cabinet bookshelf wood', qty:1, price:3800, variant:'' },
  { id:'#260617AC327ED0', customer:'sevener07', deadline:'2026-07-03', date:'2026-06-17', raw:'Climbing Wall Panel wood indoor', qty:1, price:6500, variant:'' },
  { id:'#2606169DVW14H1', customer:'soungpichate', deadline:'2026-07-02', date:'2026-06-16', raw:'Balance board stepping stones sensory play', qty:1, price:2800, variant:'' },
];

// ============================================================
// FETCH ERP
// ============================================================
async function fetchSheet(tab) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(tab)}?key=${API_KEY}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return (await r.json()).values || [];
}

function parseTaobao(rows) {
  return rows.slice(1).filter(c => c[0] && c[1]?.startsWith('2026') && !['订单状态','交易关闭'].includes(c[2]))
    .filter(c => parseFloat((c[9]||'0').replace(/[￥,]/g,'')) > 0)
    .map(c => ({
      source:'Taobao', name:c[4]||'', qty:parseInt(c[7])||1,
      cny:parseFloat((c[9]||'0').replace(/[￥,]/g,''))||0,
      tracking:(c[12]||'').trim(), url:c[5]||'', date:c[1]?.slice(0,10)||''
    }));
}

function parse1688(rows) {
  let headers = null;
  const items = [];
  rows.forEach(c => {
    if (c[0]==='订单编号') { headers = c; return; }
    if (!headers) return;
    const g = n => { const i=headers.indexOf(n); return i>=0?(c[i]||'').trim():''; };
    if (g('订单状态')==='交易关闭') return;
    const dateRaw = g('订单创建时间');
    if (!dateRaw.startsWith('2026')) return;
    const paid = parseFloat(g('实付款(元)').replace(/[,，]/g,''))||0;
    if (!paid) return;
    items.push({
      source:'1688', name:g('货品标题'), qty:parseInt(g('数量'))||1,
      cny:paid, tracking:g('运单号'), url:'', date:dateRaw.slice(0,10)
    });
  });
  return items;
}

async function loadERP() {
  if (API_KEY === 'YOUR_NEW_API_KEY_HERE') {
    document.getElementById('errBox').innerHTML = `<div class="errbox">⚠️ ใส่ API Key ก่อนค่ะ — แก้ <code>const API_KEY = "..."</code> ในไฟล์นี้</div>`;
    render(); return;
  }
  try {
    document.getElementById('errBox').innerHTML = '';
    const [tb, s16] = await Promise.all([fetchSheet('Taobao'), fetchSheet('1688')]);
    erpItems = [...parseTaobao(tb), ...parse1688(s16)].filter(e => e.name);
    document.getElementById('syncTime').textContent = `ERP ${erpItems.length} items · ${new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}`;
    render();
  } catch(e) {
    document.getElementById('errBox').innerHTML = `<div class="errbox">❌ ดึง ERP ไม่ได้: ${e.message}</div>`;
    render();
  }
}

// ============================================================
// VR SYNC — reads from Claude in Chrome message
// ============================================================
function syncVR() {
  document.getElementById('vrLoading').classList.add('show');
  document.getElementById('vrBtn').textContent = '⏳ กำลัง Sync...';

  // Listen for VR data from Chrome extension via postMessage
  window.addEventListener('message', function handler(e) {
    if (e.data?.type === 'VR_DATA') {
      vrData = e.data.data;
      localStorage.setItem('a_vr_v1', JSON.stringify(vrData));
      document.getElementById('vrLoading').classList.remove('show');
      document.getElementById('vrBtn').textContent = '🚢 Sync VR Cargo';
      window.removeEventListener('message', handler);
      render();
      alert(`✅ Sync VR สำเร็จ!\n\nถึงไทยแล้ว: ${Object.values(vrData).filter(v=>v.isArrived).length} รายการ\nยังไม่ถึง: ${Object.values(vrData).filter(v=>!v.isArrived).length} รายการ`);
    }
  });

  // Open VR portal in new tab with auto-reader script
  const script = `
// Auto-read VR Cargo data and send to Fulfillment app
(function() {
  const mainTable = document.querySelector('table.lot_table');
  if (!mainTable) { alert('ไม่พบข้อมูล VR — เปิดหน้า /payment/create ก่อนค่ะ'); return; }
  
  const rows = [...mainTable.querySelectorAll('tbody tr')];
  const data = {};
  
  rows.forEach(row => {
    const cells = [...row.querySelectorAll('td')].map(td => td.innerText.trim());
    if (cells.length < 20) return;
    const tracking = cells[2];
    if (!tracking || tracking === '-') return;
    
    const arrivedTH = cells[20] || '';
    const isArrived = !!(arrivedTH && arrivedTH.match(/\\d{2}\\/\\d{2}\\/\\d{4}/));
    const priceKg = parseFloat((cells[21]||'').replace(/[^0-9.]/g,'')) || 0;
    const priceCbm = parseFloat((cells[22]||'').replace(/[^0-9.]/g,'')) || 0;
    
    data[tracking] = {
      lot: cells[1],
      tracking,
      enteredWH: cells[18] || '',
      exitWH: cells[19] || '',
      arrivedTH: isArrived ? arrivedTH : null,
      isArrived,
      shippingCost: priceKg || priceCbm || 0
    };
  });
  
  // Send back to opener
  if (window.opener) {
    window.opener.postMessage({ type: 'VR_DATA', data }, '*');
    alert('✅ ส่งข้อมูลกลับแล้ว! กลับไปหน้า Fulfillment ได้เลยค่ะ');
    window.close();
  } else {
    alert('ไม่พบ opener window');
  }
})();
  `;

  const encoded = encodeURIComponent(script);
  const newWin = window.open('https://portal.vr-cargo.com/payment/create', '_blank');

  // Show instruction
  setTimeout(() => {
    alert('📋 วิธี Sync VR Cargo:\n\n1. รอหน้า VR Cargo โหลดเสร็จ\n2. กด F12 → Console\n3. Paste โค้ดนี้แล้วกด Enter:\n\n' + script.trim());
  }, 2000);
}

// ============================================================
// PROCESS
// ============================================================
function matchProduct(raw) {
  const t = (raw||'').toLowerCase();
  for (const m of PMAP) if (m.kw.some(k=>t.includes(k.toLowerCase()))) return m;
  return { p:raw?.slice(0,40)||'?', e:'📦', unmatched:true };
}

function findERP(productName) {
  const pLower = productName.toLowerCase();
  return erpItems.filter(e => {
    const eLower = e.name.toLowerCase();
    const pm = PMAP.find(m=>m.p===productName);
    if (pm) return pm.kw.some(k=>eLower.includes(k.toLowerCase()));
    return false;
  });
}

function getVRStatus(tracking) {
  if (!tracking) return null;
  // Check exact match
  if (vrData[tracking]) return vrData[tracking];
  // Check base tracking (without suffix)
  const base = tracking.replace(/-\d+$/, '');
  const found = Object.values(vrData).find(v => v.tracking === base || v.tracking.startsWith(base));
  return found || null;
}

function daysDiff(dl) {
  return Math.ceil((new Date(dl) - TODAY) / 86400000);
}

function processAll() {
  return SHOPEE.map(o => {
    const ov = overrides[o.id] || {};
    const tr = trackOverrides[o.id] || {};
    const m = matchProduct(o.raw);
    const product = ov.product || m.p;
    const emoji = m.e || '📦';

    // Find ERP matches
    const erpMatches = findERP(product);
    const erpItem = erpMatches[0] || null;
    const hasErp = erpMatches.length > 0;

    // Tracking
    const tracking = ov.tracking || tr.tracking || erpItem?.tracking || '';
    const cargoType = ov.cargo || tr.cargo || (tracking.match(/^(DPK|SF|S7)/i) ? 'bd' : tracking ? 'vr' : '');

    // VR status
    const vr = cargoType === 'vr' ? getVRStatus(tracking) : null;
    const isBD = cargoType === 'bd';

    // Stock status
    let stockStatus = 'nostock';
    if (isBD && tracking) stockStatus = 'bd-direct';
    else if (vr?.isArrived) stockStatus = 'arrived';
    else if (vr && !vr.isArrived) stockStatus = 'transit';
    else if (tracking && cargoType) stockStatus = 'tracking-added';
    else if (hasErp && !tracking) stockStatus = 'has-erp-no-tracking';

    // Cost
    const vrCost = vr?.shippingCost || 0;
    const cnyUnit = ov.cost ? 0 : (erpItem ? erpItem.cny / erpItem.qty : 0);
    const costTHB = ov.cost ? parseFloat(ov.cost) : Math.round(cnyUnit * 4.95) + vrCost;

    // Profit
    const sellPrice = ov.price ? parseFloat(ov.price) : o.price;
    const netRevenue = Math.round(sellPrice * (1 - SHOPEE_FEE));
    const profit = netRevenue - (costTHB * o.qty);
    const margin = sellPrice > 0 ? Math.round((profit/sellPrice)*100) : 0;

    const days = daysDiff(o.deadline);

    return { ...o, product, emoji, hasErp, erpMatches, erpItem, tracking, cargoType, vr, isBD, stockStatus, costTHB, sellPrice, netRevenue, profit, margin, days, ov };
  });
}

// ============================================================
// RENDER HELPERS
// ============================================================
function dlBadge(days, dl) {
  const d = new Date(dl).toLocaleDateString('th-TH',{day:'numeric',month:'short'});
  if (days<0) return `<span class="dl-badge dl-u">⚠️ เกิน ${Math.abs(days)}วัน</span>`;
  if (days<=3) return `<span class="dl-badge dl-u">🔴 ${d} (${days}วัน)</span>`;
  if (days<=7) return `<span class="dl-badge dl-s">🟡 ${d} (${days}วัน)</span>`;
  return `<span class="dl-badge dl-o">🟢 ${d} (${days}วัน)</span>`;
}

function statusBlock(o) {
  const { stockStatus, vr, tracking, isBD, hasErp, erpMatches, erpItem } = o;

  // ERP purchase link
  const erpLink = erpItem?.url ? `<a href="${erpItem.url}" target="_blank">🛒 สั่งซื้ออีกครั้ง</a>` : '';
  const erpInfo = hasErp ? `
    <div class="sp"><div class="erp-row">
      <div class="erp-col"><strong>📋 ERP Match</strong><span>${erpMatches.length} รายการ</span></div>
      ${erpItem ? `<div class="erp-col"><strong>ราคาจีน</strong><span>¥${erpItem.cny.toFixed(0)} (฿${Math.round(erpItem.cny*4.95).toLocaleString()})</span></div>` : ''}
      ${erpItem ? `<div class="erp-col"><strong>Tracking ERP</strong><span class="track">${erpItem.tracking||'-'}</span></div>` : ''}
      ${erpItem?.url ? `<div class="erp-col"><strong>ลิงค์สั่งซื้อ</strong>${erpLink}</div>` : ''}
    </div></div>` : '';

  if (stockStatus === 'nostock' && !hasErp) return `
    ${erpInfo}
    <div class="sp"><div class="status-box sb-nostock">
      <div class="sdot sd-p"></div>
      <div class="stext"><strong>🟣 ไม่มีสต็อค — ยังไม่เคยสั่งสินค้านี้</strong>
        <span>ต้องสั่งจาก Taobao/1688 ก่อน — กด "สั่งซื้อเพิ่ม" แล้วใส่ tracking กลับมา</span>
      </div>
    </div></div>`;

  if (stockStatus === 'has-erp-no-tracking') return `
    ${erpInfo}
    <div class="sp"><div class="status-box sb-unknown">
      <div class="sdot sd-gr"></div>
      <div class="stext"><strong>📋 พบใน ERP — รอใส่ Tracking</strong>
        <span>สั่งจากจีนแล้ว — กด "ใส่ Tracking" เพื่อติดตามสถานะ</span>
      </div>
    </div></div>`;

  if (stockStatus === 'arrived') return `
    ${erpInfo}
    <div class="sp"><div class="status-box sb-arrived">
      <div class="sdot sd-g"></div>
      <div class="stext"><strong>✅ ถึงไทยแล้ว — พร้อมแพค!</strong>
        <span>ถึงไทย: ${vr.arrivedTH} · LOT: ${vr.lot} · ค่าขนส่ง VR: ฿${vr.shippingCost.toLocaleString()}</span>
        <div class="track">${tracking}</div>
      </div>
    </div></div>`;

  if (stockStatus === 'transit') return `
    ${erpInfo}
    <div class="sp"><div class="status-box sb-transit">
      <div class="sdot sd-y"></div>
      <div class="stext"><strong>⏳ อยู่ระหว่างขนส่ง — รอถึงไทย</strong>
        <span>เข้าโกดังจีน: ${vr.enteredWH || '-'} · ยังไม่ถึงไทย</span>
        <div class="track">${tracking}</div>
      </div>
      <a class="sbtn sbtn-vr" href="https://portal.vr-cargo.com/tracking" target="_blank">🔍 VR Portal</a>
    </div></div>`;

  if (stockStatus === 'bd-direct') return `
    ${erpInfo}
    <div class="sp"><div class="status-box sb-bd">
      <div class="sdot sd-b"></div>
      <div class="stext"><strong>📦 BD Cargo — ส่งตรงจากจีน</strong>
        <span>ติดตามได้ผ่านระบบ BD Cargo โดยตรง</span>
        <div class="track">${tracking}</div>
      </div>
    </div></div>`;

  if (stockStatus === 'tracking-added') return `
    ${erpInfo}
    <div class="sp"><div class="status-box sb-transit">
      <div class="sdot sd-y"></div>
      <div class="stext"><strong>⏳ ใส่ Tracking แล้ว — รอ Sync VR</strong>
        <span>กด 🚢 Sync VR Cargo เพื่ออัปเดตสถานะ</span>
        <div class="track">${tracking}</div>
      </div>
    </div></div>`;

  return `${erpInfo}`;
}

function costBlock(o) {
  if (!o.sellPrice) return '';
  return `<div class="sp"><div class="cost-grid">
    <div><div class="cg-label">ราคา Shopee</div><div class="cg-val">฿${o.sellPrice.toLocaleString()}</div></div>
    <div><div class="cg-label">หัก Shopee 29%</div><div class="cg-val" style="color:#EF4444">-฿${(o.sellPrice-o.netRevenue).toLocaleString()}</div></div>
    <div><div class="cg-label">รายได้สุทธิ</div><div class="cg-val">฿${o.netRevenue.toLocaleString()}</div></div>
    <div><div class="cg-label">ต้นทุน (฿)</div><div class="cg-val" style="color:#EF4444">-฿${(o.costTHB*o.qty).toLocaleString()}</div></div>
    <div><div class="cg-label">กำไร / Margin</div><div class="cg-val ${o.profit>=0?'pp':'pn'}">฿${o.profit.toLocaleString()} (${o.margin}%)</div></div>
  </div></div>`;
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const all = processAll();
  const q = document.getElementById('searchInput').value.toLowerCase();

  const counts = {
    pending: all.filter(o=>!packed[o.id]),   // ทุก order ที่ยังไม่แพค
    arrived: all.filter(o=>!packed[o.id]&&o.stockStatus==='arrived'),
    nostock: all.filter(o=>!packed[o.id]&&['nostock','has-erp-no-tracking'].includes(o.stockStatus)),
    packed:  all.filter(o=>packed[o.id]),
  };

  document.getElementById('b-p').textContent   = counts.pending.length;
  document.getElementById('b-arr').textContent = counts.arrived.length;
  document.getElementById('b-ns').textContent  = counts.nostock.length;
  document.getElementById('b-pk').textContent  = counts.packed.length;

  const pend = all.filter(o=>!packed[o.id]);
  const rev = pend.reduce((a,o)=>a+o.netRevenue,0);
  const prof = pend.reduce((a,o)=>a+o.profit,0);
  const urgent = pend.filter(o=>o.days<=3);
  const arrived = all.filter(o=>o.stockStatus==='arrived'&&!packed[o.id]);

  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="slabel">🟠 รอจัดส่ง</div><div class="sval" style="color:#D0011B">${counts.pending.length}</div><div class="ssub">orders</div></div>
    <div class="stat"><div class="slabel">✅ ถึงไทยแล้ว</div><div class="sval" style="color:#10B981">${arrived.length}</div><div class="ssub">พร้อมแพค</div></div>
    <div class="stat"><div class="slabel">⚠️ เร่งด่วน</div><div class="sval" style="color:#EF4444">${urgent.length}</div><div class="ssub">≤3 วัน</div></div>
    <div class="stat"><div class="slabel">🟣 ต้องสั่งเพิ่ม</div><div class="sval" style="color:#8B5CF6">${counts.nostock.length}</div><div class="ssub">ไม่มีสต็อค</div></div>
    <div class="stat"><div class="slabel">💰 รายได้สุทธิ</div><div class="sval" style="color:#D0011B;font-size:15px">฿${rev.toLocaleString()}</div><div class="ssub">หัก 29%</div></div>
    <div class="stat"><div class="slabel">📈 กำไรรวม</div><div class="sval" style="color:#10B981;font-size:15px">฿${prof.toLocaleString()}</div><div class="ssub">ประมาณการ</div></div>
  `;

  const filtered = all.filter(o => {
    const ip = !!packed[o.id];
    const ns = ['nostock','has-erp-no-tracking'].includes(o.stockStatus);
    const arr = o.stockStatus==='arrived';
    if (currentTab==='pending' && ip) return false;                    // รอจัดส่ง = ทุกอันที่ยังไม่แพค
    if (currentTab==='arrived' && (ip||!arr)) return false;            // ถึงไทยแล้ว = arrived เท่านั้น
    if (currentTab==='nostock' && (!ns||ip)) return false;             // ต้องสั่งเพิ่ม = nostock เท่านั้น
    if (currentTab==='packed' && !ip) return false;                    // แพคแล้ว
    if (q && !o.id.toLowerCase().includes(q) && !o.product.toLowerCase().includes(q) && !o.customer.toLowerCase().includes(q) && !(o.tracking||'').includes(q)) return false;
    return true;
  }).sort((a,b) => {
    const ap=!!packed[a.id],bp=!!packed[b.id];
    if(ap!==bp) return ap?1:-1;
    // arrived first, then by urgency
    const order = {arrived:0, transit:1, 'tracking-added':2, 'bd-direct':3, 'has-erp-no-tracking':4, nostock:5};
    const ao = order[a.stockStatus]??3, bo = order[b.stockStatus]??3;
    if(ao!==bo) return ao-bo;
    return a.days - b.days;
  });

  if (!filtered.length) {
    document.getElementById('ordersList').innerHTML = `<div style="text-align:center;padding:60px 20px"><div style="font-size:40px;margin-bottom:12px">🎉</div><div style="font-size:15px;font-weight:700;color:#374151">ไม่มี order ในหมวดนี้</div></div>`;
    return;
  }

  document.getElementById('ordersList').innerHTML = filtered.map(o => {
    const ip = !!packed[o.id];
    const cls = ip ? 'done'
      : o.stockStatus==='arrived' ? 'ready'
      : ['transit','tracking-added','bd-direct'].includes(o.stockStatus) ? 'transit'
      : ['nostock','has-erp-no-tracking'].includes(o.stockStatus) ? 'nostock'
      : o.days<=3 ? 'urgent' : 'normal';

    const canPack = o.stockStatus==='arrived' || o.isBD || ip;

    return `<div class="card ${cls}">
      <div class="ctop">
        <div class="cicon">${o.emoji}</div>
        <div class="cmain">
          <div class="cid">${o.id}</div>
          <div class="cprod">
            ${o.product}
            <span class="badge ${o.hasErp?'b-erp':'b-noerp'}">${o.hasErp?'📋 ERP ✓':'⚠️ ไม่มีในERP'}</span>
          </div>
          <div class="cmeta">
            <span class="mi">👤 <strong>${o.customer}</strong></span>
            <span class="mi">Qty ${o.qty}</span>
            ${o.variant?`<span class="mi">📌 ${o.variant}</span>`:''}
            ${dlBadge(o.days, o.deadline)}
          </div>
        </div>
        <div class="cright">
          <div class="cprice">฿${o.sellPrice.toLocaleString()}</div>
          ${o.costTHB?`<div class="cprofit ${o.profit>=0?'pp':'pn'}">กำไร ${o.margin}%</div>`:''}
        </div>
      </div>
      ${statusBlock(o)}
      ${costBlock(o)}
      <div class="cactions">
        ${ip
          ? `<button class="btn-done">✅ แพคแล้ว</button><span class="packed-time">บันทึก ${packed[o.id]}</span>`
          : o.stockStatus==='arrived'
            ? `<button class="btn-pack" onclick="packOrder('${o.id}')">✅ แพคแล้ว</button>
               <a class="btn-shopee" href="https://seller.shopee.co.th/portal/sale/order" target="_blank">🛍️ Shopee</a>`
            : ['nostock','has-erp-no-tracking'].includes(o.stockStatus)
              ? `${o.erpItem?.url?`<a class="btn-reorder" href="${o.erpItem.url}" target="_blank">🛒 สั่งซื้อเพิ่ม</a>`:''}
                 <button class="btn-edit" onclick="openTrack('${o.id}')">📦 ใส่ Tracking</button>`
              : `<button class="btn-shopee" onclick="openTrack('${o.id}')">📦 ใส่ Tracking</button>`
        }
        <button class="btn-edit" onclick="openEdit('${o.id}')">✏️ แก้ไข</button>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// ACTIONS
// ============================================================
function packOrder(id) {
  packed[id] = new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  localStorage.setItem('a_packed_v5', JSON.stringify(packed));
  render();
}

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function openEdit(id) {
  const all = processAll();
  const o = all.find(x=>x.id===id);
  if (!o) return;
  editingId = id;
  document.getElementById('e-id').value = id;
  document.getElementById('e-prod').value = o.product;
  document.getElementById('e-track').value = o.tracking||'';
  document.getElementById('e-cost').value = o.costTHB||'';
  document.getElementById('e-price').value = o.sellPrice||'';
  document.getElementById('e-cargo').value = o.cargoType||'vr';
  document.getElementById('e-note').value = o.ov.note||'';
  document.getElementById('editModal').classList.add('open');
}

function closeEdit() {
  document.getElementById('editModal').classList.remove('open');
  editingId = null;
}

function saveEdit() {
  if (!editingId) return;
  overrides[editingId] = {
    product: document.getElementById('e-prod').value,
    tracking: document.getElementById('e-track').value,
    cost: document.getElementById('e-cost').value,
    price: document.getElementById('e-price').value,
    cargo: document.getElementById('e-cargo').value,
    note: document.getElementById('e-note').value,
  };
  localStorage.setItem('a_ov_v5', JSON.stringify(overrides));
  closeEdit();
  render();
}

function openTrack(id) {
  trackingForId = id;
  document.getElementById('t-track').value = '';
  document.getElementById('t-cargo').value = 'vr';
  document.getElementById('trackModal').classList.add('open');
}

function closeTrack() {
  document.getElementById('trackModal').classList.remove('open');
  trackingForId = null;
}

function saveTracking() {
  if (!trackingForId) return;
  const tracking = document.getElementById('t-track').value.trim();
  const cargo = document.getElementById('t-cargo').value;
  if (!tracking) { alert('กรุณาใส่ tracking number'); return; }
  trackOverrides[trackingForId] = { tracking, cargo };
  localStorage.setItem('a_track_v5', JSON.stringify(trackOverrides));
  closeTrack();
  render();
  if (cargo === 'vr') {
    if (confirm('บันทึก tracking แล้ว!\nต้องการ Sync VR Cargo เพื่อเช็คสถานะตอนนี้เลยไหมคะ?')) {
      syncVR();
    }
  }
}
